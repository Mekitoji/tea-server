services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["sh", "-c", "bun run dev 2>&1 | tee -a /app/logs/api.log"]
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgres://teamaster:teapassword@postgres:5432/tea_master
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      PG_APPLICATION_NAME: ${PG_APPLICATION_NAME:-tea-server-api}
      PG_POOL_MIN: ${PG_POOL_MIN:-1}
      PG_POOL_MAX: ${PG_POOL_MAX:-10}
      PG_POOL_IDLE_TIMEOUT_MS: ${PG_POOL_IDLE_TIMEOUT_MS:-0}
      PG_POOL_CONNECTION_TIMEOUT_MS: ${PG_POOL_CONNECTION_TIMEOUT_MS:-5000}
      PG_POOL_KEEP_ALIVE: ${PG_POOL_KEEP_ALIVE:-true}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-tea-server}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${DOCKER_OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_TRACE_HEALTHCHECKS: ${OTEL_TRACE_HEALTHCHECKS:-false}
      OTEL_TRACE_METRICS: ${OTEL_TRACE_METRICS:-false}
      OTEL_PG_ENHANCED_DATABASE_REPORTING: ${OTEL_PG_ENHANCED_DATABASE_REPORTING:-false}
      METRICS_HTTP_HEALTHCHECKS: ${METRICS_HTTP_HEALTHCHECKS:-false}
      LOG_HTTP_METRICS: ${LOG_HTTP_METRICS:-false}
    env_file:
      - ./.env
    ports:
      - "3000:3000"
    volumes:
      - ./logs:/app/logs
      - ./src:/app/src
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./bunfig.toml:/app/bunfig.toml:ro
    depends_on:
      postgres:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.130.0
    profiles:
      - observability
    volumes:
      - ./logs:/otel-logs
      - ./otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/jaeger:2.17.0
    profiles:
      - observability
    command:
      - "--set"
      - "receivers.otlp.protocols.grpc.endpoint=0.0.0.0:4317"
      - "--set"
      - "receivers.otlp.protocols.http.endpoint=0.0.0.0:4318"
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"

  prometheus:
    image: prom/prometheus:v2.55.1
    profiles:
      - observability
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.5.2
    profiles:
      - observability
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    profiles:
      - observability
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    ports:
      - "${CADVISOR_PORT:-8080}:8080"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: tea_master
      POSTGRES_USER: teamaster
      POSTGRES_PASSWORD: teapassword
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_NAME: ${ADMIN_NAME:-admin}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql:ro
      - ./src/db/seeds/001_initial_data.sql:/docker-entrypoint-initdb.d/002_initial_data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teamaster -d tea_master"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  grafana_data:
  postgres_data:
  prometheus_data:
