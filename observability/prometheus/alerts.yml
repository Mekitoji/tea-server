groups:
  - name: tea-server
    rules:
      - alert: TeaServerDown
        expr: up{job="tea-server"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: Tea Server metrics target is down
          description: Prometheus has not been able to scrape tea-server for more than 1 minute.

      - alert: TeaServerHighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{job="tea-server",status_code=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_requests_total{job="tea-server"}[5m])), 0.001)
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Tea Server 5xx rate is above 5%
          description: More than 5% of API requests have returned 5xx responses for 5 minutes.

      - alert: TeaServerHighLatency
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, method, route) (
              rate(http_request_duration_seconds_bucket{job="tea-server"}[5m])
            )
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Tea Server p95 latency is above 1 second
          description: At least one API route has p95 latency above 1 second for 5 minutes.

      - alert: TeaServerHighMemory
        expr: process_resident_memory_bytes{job="tea-server"} > 512 * 1024 * 1024
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Tea Server resident memory is above 512 MiB
          description: The API process has used more than 512 MiB RSS for 10 minutes.

      - alert: TeaServerEventLoopLagHigh
        expr: nodejs_eventloop_lag_p99_seconds{job="tea-server"} > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Tea Server event loop p99 lag is above 100 ms
          description: The API runtime event loop p99 lag has stayed above 100 ms for 5 minutes.
